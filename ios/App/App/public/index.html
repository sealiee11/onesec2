<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<title>Toustream</title>
<style>
  :root { color-scheme: dark; }
  html,body {
    margin:0; padding:0; height:100%; width:100%;
    background:#0b0d14; color:#fff;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    overflow:hidden;
  }
  .wrap{
    position:fixed; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:
      radial-gradient(60% 50% at 50% 20%, rgba(255,45,85,.18) 0%, rgba(11,13,20,0) 70%),
      #0b0d14;
  }
  .logo{
    font-size:42px; font-weight:800; letter-spacing:-.5px;
    background:linear-gradient(180deg,#fff 0%,#cfd3df 100%);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    margin:0 0 18px;
  }
  .play{
    display:inline-block; width:14px; height:18px; transform:translateY(2px);
    background:linear-gradient(180deg,#ff2d55,#ff5d77);
    clip-path:polygon(0 0,100% 50%,0 100%);
    margin-right:10px;
  }
  .spinner{
    width:38px; height:38px; border-radius:50%;
    border:3px solid rgba(255,255,255,.12);
    border-top-color:#ff2d55;
    animation:spin .8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  .hint{
    margin-top:22px; font-size:13px; color:#7a8198; letter-spacing:.3px;
  }
</style>
</head>
<body>
<div class="wrap">
  <h1 class="logo"><span class="play"></span>Toustream</h1>
  <div class="spinner"></div>
  <div class="hint">loading library…</div>
</div>
</body>
</html>
